services:
  - type: web
    name: backend-don-pepe
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn Backend_Don_Pepe.wsgi:application --bind 0.0.0.0:$PORT
    
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: bodega_don_pepe
          property: connectionString
